name: Release to CurseForge

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate CurseForge API key
        shell: bash
        run: |
          if [ -z "${{ secrets.CF_API_KEY }}" ]; then
            echo "CF_API_KEY secret is missing or empty."
            echo "Set it in: Repo Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Package and Upload
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_PROJECT_ID: 1464507
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
